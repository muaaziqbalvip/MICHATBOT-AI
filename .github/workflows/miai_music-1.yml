name: "miai-music | MusicGen Large | 24/7 Music Engine"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  miai-music-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      MODEL_NAME: "miai-music"
      HF_REPO: "facebook/musicgen-large"
      CACHE_KEY: "miai-music-musicgenlarge-v2"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-music
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download MusicGen Large Model"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-music
          pip install -U "huggingface_hub"
          echo "🔄 Downloading facebook/musicgen-large (~3.3GB)..."
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
            repo_id='facebook/musicgen-large',
            local_dir='./model_files/miai-music',
            ignore_patterns=['*.fp32', '*.onnx*', 'openvino*']
          )
          print('✅ Download complete')
          "

      - name: "📚 Install System Dependencies (FFmpeg)"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libavfilter-dev \
            libswscale-dev \
            libswresample-dev \
            pkg-config

      - name: "📦 Install Python Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.110.0 uvicorn==0.28.0 pyngrok requests
          pip install transformers==4.45.0 accelerate
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install audiocraft scipy soundfile

      - name: "🚀 Start miai-music Engine"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_TEAM_SLUG: ${{ secrets.VERCEL_TEAM_SLUG }}
          MODEL_PATH: "./model_files/miai-music"
          PORT: "8002"
        run: |
          python server_music_urdu.py > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started (PID: $SERVER_PID)"

          echo "⏳ Loading MusicGen Large model (2-3 min)..."
          sleep 120

          echo "🔍 Health check..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8002/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Wait $i/30..."
            sleep 10
          done

          echo "📡 Fetching public URL..."
          sleep 5
          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"https://[^"]*' | cut -d'"' -f4 | head -1)

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Failed to get URL"
            cat server.log
            exit 1
          fi

          echo "🌐 Public URL: $PUBLIC_URL"

          echo "🔄 Manual Setup Required:"
          echo "   1. Vercel Dashboard → Settings → Environment Variables"
          echo "   2. Add: MIAI_MUSIC_URL = $PUBLIC_URL"

          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "🚀 Triggering Vercel redeploy..."
            curl -X POST "${VERCEL_DEPLOY_HOOK_URL}" 2>/dev/null && echo "✅ Redeploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK_URL secret not set"
          fi

          echo "⏱️ Running for 5hr..."
          sleep 18000

          curl -X POST "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_music.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' 2>/dev/null && echo "🔄 Next run scheduled"

          wait $SERVER_PID
