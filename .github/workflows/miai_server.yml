name: MI AI 24-7 Engine Loop & Vercel Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache AI Model Storage
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files
          key: ${{ runner.os }}-miai-v1-cache

      - name: Download miai-v1 Core File
        run: |
          mkdir -p model_files
          if [ "${{ steps.cache-model.outputs.cache-hit }}" != "true" ]; then
            curl -L "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/config.json" -o ./model_files/config.json
            curl -L "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/tokenizer.json" -o ./model_files/tokenizer.json
            curl -L "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/tokenizer_config.json" -o ./model_files/tokenizer_config.json
            curl -L "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/special_tokens_map.json" -o ./model_files/special_tokens_map.json
            curl -L "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/model.safetensors?download=true" -o ./model_files/model.safetensors
          fi

      - name: Setup Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn transformers torch pyngrok requests

      - name: Launch Engine & Sync With Vercel Gateway
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
        run: |
          # 1. Core API Backend start karna
          python server.py &
          
          echo "Waiting for Model to load and Ngrok tunnel to initialize..."
          
          # 2. Ngrok Public Tunnel Link fetch karna loop me
          PUBLIC_URL=""
          for i in {1..24}; do
            sleep 5
            PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    if 'tunnels' in data and len(data['tunnels']) > 0:
        print(data['tunnels'][0]['public_url'])
except Exception:
    pass
" 2>/dev/null)
            
            if [ ! -z "$PUBLIC_URL" ]; then
              echo "Tunnel found on attempt $i!"
              break
            fi
            echo "Still waiting for tunnel setup... ($((i*5))s)"
          done

          if [ -z "$PUBLIC_URL" ]; then
            echo "ERROR: Ngrok tunnel could not be established."
            exit 1
          fi

          echo "Successfully fetched Tunnel URL: $PUBLIC_URL"
          
          # 3. Safe Python Inline script to sync with Vercel API without YAML character errors
          echo "Updating Vercel Environment Variables via Python API..."
          python3 -c "
import os, requests
token = os.getenv('VERCEL_TOKEN')
project = os.getenv('VERCEL_PROJECT_NAME')
url = os.getenv('PUBLIC_URL')

headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

# Purana variable delete karna (ignore failure if doesn't exist)
requests.delete(f'https://api.vercel.com/v9/projects/{project}/env/GITHUB_SERVER_URL', headers=headers)

# Naya variable set karna
payload = {
    'key': 'GITHUB_SERVER_URL',
    'value': url,
    'type': 'plain',
    'target': ['production', 'preview', 'development']
}
res = requests.post(f'https://api.vercel.com/v10/projects/{project}/env', headers=headers, json=payload)
print('Vercel API Response:', res.status_code, res.text)
"
          
          echo "Vercel Sync Completed Successfully! miai-v1 is globally open."
          
          # Server loop backup sleep duration (5 hours 50 mins)
          sleep 21000
