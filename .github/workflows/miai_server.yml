name: MI AI 24/7 Engine Loop & Vercel Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-loop triggers every 6 hours perfectly
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache AI Model Storage
      id: cache-model
      uses: actions/cache@v4
      with:
        path: ./model_files
        key: ${{ runner.os }}-qwen2.5-0.5b-cache # Cache key updated for Qwen

    - name: Download miai-v1 Core File
      run: |
        mkdir -p model_files
        if [ "${{ steps.cache-model.outputs.cache-hit }}" != "true" ]; then
          # Qwen2.5-0.5B-Instruct Official Urdu-Supported Links
          curl -L "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct/resolve/main/config.json" -o ./model_files/config.json
          curl -L "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct/resolve/main/tokenizer.json" -o ./model_files/tokenizer.json
          curl -L "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct/resolve/main/tokenizer_config.json" -o ./model_files/tokenizer_config.json
          curl -L "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct/resolve/main/model.safetensors?download=true" -o ./model_files/model.safetensors
        fi

    - name: Setup Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn transformers torch pyngrok requests

    - name: Launch Engine & Sync With Vercel Gateway
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
      run: |
        # Core python API ko background process me run karna
        python server.py &
        
        # Qwen thoda bada model hai, isliye load hone ke liye 30 seconds wait safe rahega
        sleep 30
        
        # Extracted Link from Ngrok
        PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
        echo "Successfully fetched Tunnel URL: $PUBLIC_URL"
        
        # Direct Vercel API Call (Bypass CLI Errors)
        echo "Syncing with Vercel API..."
        curl -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/GITHUB_SERVER_URL" -H "Authorization: Bearer ${VERCEL_TOKEN}" || true
        
        curl -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env" \
          -H "Authorization: Bearer ${VERCEL_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"key\":\"GITHUB_SERVER_URL\",\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}"
        
        echo "Vercel Sync Completed! miai-v1 is globally open."
        # Keep GitHub active till 6 hours limit
        wait
