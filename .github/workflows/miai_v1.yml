name: "miai-v1 | Qwen2.5-0.5B | 24/7 Engine"

on:
  schedule:
    - cron: '0 */5 * * *'   # Har 5 ghante me auto restart (5hr < 6hr GitHub limit)
  workflow_dispatch:
    inputs:
      force_restart:
        description: 'Force restart engine?'
        required: false
        default: 'false'

jobs:
  miai-v1-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # 5hr 50min = safe before GitHub 6hr kill

    env:
      MODEL_NAME: "miai-v1"
      HF_REPO: "Qwen/Qwen2.5-0.5B-Instruct"
      CACHE_KEY: "miai-v1-qwen05b-v2"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-v1
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download miai-v1 Model (Qwen2.5-0.5B)"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-v1
          echo "Downloading miai-v1 (Qwen2.5-0.5B) model files..."
          BASE="https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct/resolve/main"
          FILES="config.json tokenizer.json tokenizer_config.json special_tokens_map.json generation_config.json"
          for f in $FILES; do
            echo "⬇️ $f"
            curl -fsSL "$BASE/$f" -o "./model_files/miai-v1/$f" || echo "WARN: $f skipped"
          done
          # Model weights (safetensors ~1GB)
          curl -fL --retry 5 --retry-delay 10 \
            "$BASE/model.safetensors" \
            -o "./model_files/miai-v1/model.safetensors"
          echo "✅ miai-v1 download complete"

      - name: "📚 Install Dependencies"
        run: |
          pip install -q --upgrade pip
          pip install -q fastapi uvicorn pyngrok requests \
            transformers==4.45.0 \
            torch==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu \
            accelerate sentencepiece protobuf

      - name: "🚀 Launch miai-v1 Engine + Vercel Sync"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          MODEL_ID: "miai-v1"
          MODEL_PATH: "./model_files/miai-v1"
          MAX_TOKENS: "150"
          TEMPERATURE: "0.5"
        run: |
          # Server background me start
          python server.py &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Model load hone ka wait (0.5B = ~20s)
          echo "⏳ miai-v1 loading..."
          sleep 25

          # Health check loop
          for i in $(seq 1 10); do
            STATUS=$(curl -sf http://127.0.0.1:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','dead'))" 2>/dev/null || echo "dead")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ miai-v1 is healthy!"
              break
            fi
            echo "Retry $i/10 — waiting..."
            sleep 8
          done

          # Ngrok URL fetch
          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels | \
            python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print([x for x in t if x['proto']=='https'][0]['public_url'])" 2>/dev/null || echo "")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Ngrok URL fetch failed!"
            exit 1
          fi
          echo "🌐 miai-v1 Live: $PUBLIC_URL"

          # Vercel env update
          curl -sf -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V1_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" || true

          curl -sf -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"MIAI_V1_URL\",\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
            && echo "✅ Vercel synced — miai-v1 URL updated"

          # Auto-trigger next run before GitHub kills job
          echo "⏱️ Keeping alive for ~5hr 40min..."
          sleep 20100   # 335 min

          # Self-trigger next workflow run
          curl -sf -X POST \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_v1.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' && echo "🔄 Next loop triggered!"

          wait $SERVER_PID
