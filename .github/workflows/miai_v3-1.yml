name: "miai-v3 | SmolLM2-1.7B | 24/7 Engine"

on:
  schedule:
    - cron: '0 1,6,11,16,21 * * *'   # Independent 5hr cycle
  workflow_dispatch:

jobs:
  miai-v3-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      MODEL_NAME: "miai-v3"
      HF_REPO: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
      CACHE_KEY: "miai-v3-smollm2-v3"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-v3
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download miai-v3 Model"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-v3
          echo "🔄 Downloading SmolLM2-1.7B..."
          BASE="https://huggingface.co/HuggingFaceTB/SmolLM2-1.7B-Instruct/resolve/main"
          
          for FILE in config.json tokenizer.json tokenizer_config.json special_tokens_map.json generation_config.json; do
            echo "⬇️ $FILE"
            curl -fL --retry 3 "$BASE/$FILE" -o "./model_files/miai-v3/$FILE" || true
          done
          
          echo "⬇️ model.safetensors"
          curl -fL --retry 3 "$BASE/model.safetensors" -o "./model_files/miai-v3/model.safetensors"
          echo "✅ Download complete"

      - name: "📚 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.110.0 uvicorn==0.28.0 pyngrok requests
          pip install transformers==4.45.0 accelerate sentencepiece protobuf
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu

      - name: "🚀 Start miai-v3 Engine"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          MODEL_ID: "miai-v3"
          MODEL_PATH: "./model_files/miai-v3"
          MAX_TOKENS: "250"
          TEMPERATURE: "0.7"
          PORT: "8000"
        run: |
          python server.py > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started (PID: $SERVER_PID)"
          
          echo "⏳ Loading model (1.7B takes ~60s)..."
          sleep 65
          
          echo "🔍 Health check..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Wait $i/20..."
            sleep 5
          done
          
          echo "📡 Fetching public URL..."
          sleep 5
          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"https://[^"]*' | cut -d'"' -f4 | head -1)
          
          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Failed to get URL"
            cat server.log
            exit 1
          fi
          
          echo "🌐 Public URL: $PUBLIC_URL"
          
          curl -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V3_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" 2>/dev/null || true
          
          curl -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"MIAI_V3_URL\",\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
            2>/dev/null && echo "✅ Vercel updated"
          
          # Trigger a real redeploy so the new env var is actually picked up
          # (updating env vars via API alone does NOT refresh already-deployed
          # functions — Vercel only reads them at build/cold-start time)
          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "🚀 Triggering Vercel redeploy..."
            curl -X POST "${VERCEL_DEPLOY_HOOK_URL}" 2>/dev/null && echo "✅ Redeploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK_URL secret not set — function will keep using the OLD env var until next manual redeploy"
          fi
          
          echo "⏱️ Running for 5hr 40min..."
          sleep 20100
          
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_v3.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' 2>/dev/null && echo "🔄 Next run scheduled"
          
          wait $SERVER_PID
