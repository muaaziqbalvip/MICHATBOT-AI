name: "miai-v3 | SmolLM2-1.7B | 24/7 Engine"

on:
  schedule:
    - cron: '0 1,6,11,16,21 * * *'   # v3 independent 5hr cycle
  workflow_dispatch:

jobs:
  miai-v3-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      MODEL_NAME: "miai-v3"
      HF_REPO: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
      CACHE_KEY: "miai-v3-smollm2-17b-v1"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-v3
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download miai-v3 Model (SmolLM2-1.7B)"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-v3
          echo "Downloading miai-v3 (SmolLM2-1.7B-Instruct)..."
          BASE="https://huggingface.co/HuggingFaceTB/SmolLM2-1.7B-Instruct/resolve/main"
          FILES="config.json tokenizer.json tokenizer_config.json special_tokens_map.json generation_config.json"
          for f in $FILES; do
            echo "⬇️ $f"
            curl -fsSL "$BASE/$f" -o "./model_files/miai-v3/$f" || echo "WARN: $f skipped"
          done
          # SmolLM2-1.7B single shard ~3.4GB - use int8 quant trick via transformers
          curl -fL --retry 5 --retry-delay 15 \
            "$BASE/model.safetensors" \
            -o "./model_files/miai-v3/model.safetensors"
          echo "✅ miai-v3 download complete"

      - name: "📚 Install Dependencies"
        run: |
          pip install -q --upgrade pip
          pip install -q fastapi uvicorn pyngrok requests \
            transformers==4.45.0 \
            torch==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu \
            accelerate sentencepiece protobuf bitsandbytes

      - name: "🚀 Launch miai-v3 Engine + Vercel Sync"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          MODEL_ID: "miai-v3"
          MODEL_PATH: "./model_files/miai-v3"
          MAX_TOKENS: "250"
          TEMPERATURE: "0.7"
          LOAD_IN_8BIT: "true"
        run: |
          python server.py &
          SERVER_PID=$!

          echo "⏳ miai-v3 loading (1.7B ~55s)..."
          sleep 60

          for i in $(seq 1 15); do
            STATUS=$(curl -sf http://127.0.0.1:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','dead'))" 2>/dev/null || echo "dead")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ miai-v3 is healthy!"
              break
            fi
            echo "Retry $i/15..."
            sleep 10
          done

          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels | \
            python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print([x for x in t if x['proto']=='https'][0]['public_url'])" 2>/dev/null || echo "")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Ngrok URL fetch failed!"
            exit 1
          fi
          echo "🌐 miai-v3 Live: $PUBLIC_URL"

          curl -sf -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V3_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" || true

          curl -sf -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"MIAI_V3_URL\",\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
            && echo "✅ Vercel synced — miai-v3 URL updated"

          echo "⏱️ Keeping alive..."
          sleep 20100

          curl -sf -X POST \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_v3.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' && echo "🔄 Next loop triggered!"

          wait $SERVER_PID
