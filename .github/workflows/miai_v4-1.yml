name: "miai-v4 | Phi-2 2.7B | 24/7 Engine"

on:
  schedule:
    - cron: '15 2,7,12,17,22 * * *'   # Staggered from v1 and v2
  workflow_dispatch:

jobs:
  miai-v4-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      MODEL_NAME: "miai-v4"
      HF_REPO: "microsoft/phi-2"
      CACHE_KEY: "miai-v4-phi2-v3"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-v4
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download miai-v4 Model"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-v4
          echo "🔄 Downloading Phi-2 2.7B..."
          BASE="https://huggingface.co/microsoft/phi-2/resolve/main"
          
          for FILE in config.json tokenizer.json tokenizer_config.json special_tokens_map.json generation_config.json; do
            echo "⬇️ $FILE"
            curl -fL --retry 3 "$BASE/$FILE" -o "./model_files/miai-v4/$FILE" || true
          done
          
          # Phi-2 has 2 shards
          echo "⬇️ model-00001-of-00002.safetensors"
          curl -fL --retry 3 "$BASE/model-00001-of-00002.safetensors" -o "./model_files/miai-v4/model-00001-of-00002.safetensors"
          
          echo "⬇️ model-00002-of-00002.safetensors"
          curl -fL --retry 3 "$BASE/model-00002-of-00002.safetensors" -o "./model_files/miai-v4/model-00002-of-00002.safetensors"
          
          echo "⬇️ model.safetensors.index.json"
          curl -fL --retry 3 "$BASE/model.safetensors.index.json" -o "./model_files/miai-v4/model.safetensors.index.json"
          echo "✅ Download complete"

      - name: "📚 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.110.0 uvicorn==0.28.0 pyngrok requests
          pip install transformers==4.45.0 accelerate sentencepiece protobuf
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu

      - name: "🚀 Start miai-v4 Engine"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_3TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          MODEL_ID: "miai-v4"
          MODEL_PATH: "./model_files/miai-v4"
          MAX_TOKENS: "300"
          TEMPERATURE: "0.6"
          PORT: "8000"
        run: |
          python server.py > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started (PID: $SERVER_PID)"
          
          echo "⏳ Loading model (Phi-2 takes ~80s)..."
          sleep 85
          
          echo "🔍 Health check..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Wait $i/20..."
            sleep 5
          done
          
          echo "📡 Fetching public URL..."
          sleep 5
          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"https://[^"]*' | cut -d'"' -f4 | head -1)
          
          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Failed to get URL"
            cat server.log
            exit 1
          fi
          
          echo "🌐 Public URL: $PUBLIC_URL"
          
          # Try to delete old env var (404 if doesn't exist is OK)
          DEL_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V4_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          DEL_CODE=$(echo "$DEL_RESP" | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
          if [ "$DEL_CODE" = "204" ] || [ "$DEL_CODE" = "404" ]; then
            echo "✓ Old MIAI_V4_URL deleted or didn't exist (HTTP $DEL_CODE)"
          else
            echo "⚠️ DELETE failed with HTTP $DEL_CODE — will try to CREATE anyway"
          fi
          
          ENV_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V4_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}")
          HTTP_CODE=$(echo "$ENV_RESP" | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
          ENV_BODY=$(echo "$ENV_RESP" | sed "s/HTTP_STATUS:[0-9]*//")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Vercel env updated (HTTP $HTTP_CODE)"
          else
            echo "❌ Vercel env update FAILED (HTTP $HTTP_CODE)"
            echo "Response: $ENV_BODY"
          fi
          
          # Trigger a real redeploy so the new env var is actually picked up
          # (updating env vars via API alone does NOT refresh already-deployed
          # functions — Vercel only reads them at build/cold-start time)
          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "🚀 Triggering Vercel redeploy..."
            curl -X POST "${VERCEL_DEPLOY_HOOK_URL}" 2>/dev/null && echo "✅ Redeploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK_URL secret not set — function will keep using the OLD env var until next manual redeploy"
          fi
          
          echo "⏱️ Running for 5hr 40min..."
          sleep 20100
          
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_v4.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' 2>/dev/null && echo "🔄 Next run scheduled"
          
          wait $SERVER_PID
