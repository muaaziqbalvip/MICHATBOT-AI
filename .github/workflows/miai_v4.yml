name: "miai-v4 | Phi-2 (2.7B) | 24/7 Engine"

on:
  schedule:
    - cron: '15 2,7,12,17,22 * * *'   # Staggered from other models
  workflow_dispatch:

jobs:
  miai-v4-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      MODEL_NAME: "miai-v4"
      HF_REPO: "microsoft/phi-2"
      CACHE_KEY: "miai-v4-phi2-v2"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-v4
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download miai-v4 Model (Phi-2)"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-v4
          echo "Downloading miai-v4 (microsoft/phi-2)..."
          BASE="https://huggingface.co/microsoft/phi-2/resolve/main"
          FILES="config.json tokenizer.json tokenizer_config.json special_tokens_map.json generation_config.json"
          for f in $FILES; do
            echo "⬇️ $f"
            curl -fsSL "$BASE/$f" -o "./model_files/miai-v4/$f" || echo "WARN: $f skipped"
          done
          # phi-2 has 2 shards ~2.7GB total
          for shard in model-00001-of-00002.safetensors model-00002-of-00002.safetensors; do
            curl -fL --retry 5 --retry-delay 15 \
              "$BASE/$shard" \
              -o "./model_files/miai-v4/$shard"
          done
          curl -fsSL "$BASE/model.safetensors.index.json" \
            -o "./model_files/miai-v4/model.safetensors.index.json"
          echo "✅ miai-v4 download complete"

      - name: "📚 Install Dependencies"
        run: |
          pip install -q --upgrade pip
          pip install -q fastapi uvicorn pyngrok requests \
            transformers==4.45.0 \
            torch==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu \
            accelerate sentencepiece protobuf einops flash_attn || true

      - name: "🚀 Launch miai-v4 Engine + Vercel Sync"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          MODEL_ID: "miai-v4"
          MODEL_PATH: "./model_files/miai-v4"
          MAX_TOKENS: "300"
          TEMPERATURE: "0.6"
        run: |
          python server.py &
          SERVER_PID=$!

          echo "⏳ miai-v4 loading (Phi-2 ~70s)..."
          sleep 75

          for i in $(seq 1 15); do
            STATUS=$(curl -sf http://127.0.0.1:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','dead'))" 2>/dev/null || echo "dead")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ miai-v4 is healthy!"
              break
            fi
            echo "Retry $i/15..."
            sleep 12
          done

          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels | \
            python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print([x for x in t if x['proto']=='https'][0]['public_url'])" 2>/dev/null || echo "")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Ngrok URL fetch failed!"
            exit 1
          fi
          echo "🌐 miai-v4 Live: $PUBLIC_URL"

          curl -sf -X DELETE "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_NAME}/env/MIAI_V4_URL" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" || true

          curl -sf -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"MIAI_V4_URL\",\"value\":\"${PUBLIC_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
            && echo "✅ Vercel synced — miai-v4 URL updated"

          echo "⏱️ Keeping alive..."
          sleep 20100

          curl -sf -X POST \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_v4.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' && echo "🔄 Next loop triggered!"

          wait $SERVER_PID
