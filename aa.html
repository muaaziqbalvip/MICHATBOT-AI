<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>MI-AI API Tester</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding: 20px; } .container { max-width: 1200px; margin: 0 auto; } .header { text-align: center; color: white; margin-bottom: 40px; } .header h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); } .header p { font-size: 1.2em; opacity: 0.9; } .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; } @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } } .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transition: transform 0.3s, box-shadow 0.3s; } .card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.3); } .card h2 { color: #667eea; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; } .form-group { margin-bottom: 15px; } label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; } input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; font-family: inherit; transition: border-color 0.3s; } input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); } button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1em; transition: transform 0.2s; } button:hover { transform: scale(1.02); } button:active { transform: scale(0.98); } .output { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; border-left: 4px solid #667eea; min-height: 100px; max-height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9em; color: #333; white-space: pre-wrap; word-wrap: break-word; } .loading { color: #667eea; font-weight: bold; } .success { color: #28a745; font-weight: bold; } .error { color: #dc3545; font-weight: bold; } .config-card { grid-column: 1 / -1; } .config-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; } .config-item strong { color: #333; } .config-item code { background: white; padding: 5px 10px; border-radius: 4px; font-family: 'Courier New', monospace; color: #667eea; word-break: break-all; } .copy-btn-small { padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; font-size: 0.9em; } .copy-btn-small:hover { background: #764ba2; } .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; } .tab-btn { padding: 10px 20px; background: transparent; border: none; color: #666; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.3s; } .tab-btn.active { color: #667eea; border-bottom-color: #667eea; } .tab-content { display: none; } .tab-content.active { display: block; } </style> </head> <body> <div class="container"> <div class="header"> <h1>🚀 MI-AI API Tester</h1> <p>Test your AI API directly from browser</p> </div> <div class="card config-card"> <h2>⚙️ Configuration</h2> <div class="config-item"> <strong>API Base URL:</strong> <div style="display: flex; gap: 10px; align-items: center;"> <code id="baseUrl">https://confetti-strung-jinx.ngrok-free.dev</code> <button class="copy-btn-small" onclick="copyToClipboard(document.getElementById('baseUrl').innerText)">Copy</button> </div> </div> <div class="config-item"> <strong>API Key:</strong> <div style="display: flex; gap: 10px; align-items: center;"> <code id="apiKey">MI-KEY-FE1DG1ZYTO-ADMIN</code> <button class="copy-btn-small" onclick="copyToClipboard(document.getElementById('apiKey').innerText)">Copy</button> </div> </div> <div class="config-item"> <strong>Status:</strong> <button class="copy-btn-small" onclick="checkHealth()" style="background: #28a745;">Check Health</button> </div> <div id="healthOutput" style="margin-top: 10px; padding: 10px; background: white; border-radius: 4px; display: none;"></div> </div> <div class="main-grid"> <!-- Chat --> <div class="card"> <h2>💬 Chat (Urdu/English)</h2> <div class="form-group"> <label>Select Language:</label> <select id="chatLanguage"> <option value="urdu">Urdu (اردو)</option> <option value="english">English</option> <option value="hindi">Hindi (हिंदी)</option> <option value="arabic">Arabic (العربية)</option> </select> </div> <div class="form-group"> <label>Message:</label> <textarea id="chatMessage" placeholder="Type your message..." rows="4">Salam alaikum, tum kaise ho?</textarea> </div> <div class="form-group"> <label>Temperature: <span id="tempValue">0.7</span></label> <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7" oninput="document.getElementById('tempValue').innerText = this.value"> </div> <button onclick="testChat()">Send Message 🚀</button> <div class="output" id="chatOutput"></div> </div> <!-- Code Generation --> <div class="card"> <h2>💻 Code Generation</h2> <div class="form-group"> <label>Language:</label> <select id="codeLanguage"> <option value="python">Python</option> <option value="javascript">JavaScript</option> <option value="html">HTML</option> <option value="css">CSS</option> </select> </div> <div class="form-group"> <label>Code Prompt:</label> <textarea id="codePrompt" placeholder="What code do you want?" rows="4">Print hello world 5 times with loop</textarea> </div> <button onclick="testCode()">Generate Code 🤖</button> <div class="output" id="codeOutput"></div> </div> <!-- Image Generation --> <div class="card"> <h2>🎨 Image Generation</h2> <div class="form-group"> <label>Image Description:</label> <textarea id="imagePrompt" placeholder="Describe the image..." rows="4">Beautiful sunset over mountain landscape with golden light</textarea> </div> <button onclick="testImage()">Generate Image 🖼️</button> <div class="output" id="imageOutput"></div> </div> <!-- Long Text --> <div class="card"> <h2>📝 Long Text Generation</h2> <div class="form-group"> <label>Prompt:</label> <textarea id="longTextPrompt" placeholder="Write about..." rows="4">لکھو ایک چھوٹی کہانی</textarea> </div> <button onclick="testLongText()">Generate Story 📖</button> <div class="output" id="longTextOutput"></div> </div> <!-- Admin Panel --> <div class="card"> <h2>🔐 Generate API Key</h2> <div class="form-group"> <label>Username:</label> <input type="text" id="newUsername" placeholder="Enter username"> </div> <div class="form-group"> <label>Tier:</label> <select id="keyTier"> <option value="user">User</option> <option value="pro">Pro</option> <option value="admin">Admin</option> </select> </div> <div class="form-group"> <label>Admin Key:</label> <input type="password" id="adminKeyInput" placeholder="Enter admin key" value="MI-KEY-FE1DG1ZYTO-ADMIN"> </div> <button onclick="generateNewKey()">Generate Key 🔑</button> <div class="output" id="keyOutput"></div> </div> </div> </div> <script> const API_BASE = "https://confetti-strung-jinx.ngrok-free.dev"; const API_KEY = "MI-KEY-FE1DG1ZYTO-ADMIN"; function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('✅ Copied!'); } function showOutput(elementId, message, type = 'normal') { const el = document.getElementById(elementId); if (type === 'loading') { el.innerHTML = '<span class="loading">⏳ ' + message + '...</span>'; } else if (type === 'success') { el.innerHTML = '<span class="success">✅ ' + message + '</span>'; } else if (type === 'error') { el.innerHTML = '<span class="error">❌ ' + message + '</span>'; } else { el.innerHTML = message; } } async function checkHealth() { try { const response = await fetch(`${API_BASE}/health`); const data = await response.json(); const output = document.getElementById('healthOutput'); output.style.display = 'block'; output.innerHTML = ` <strong>Status:</strong> ${data.status}<br> <strong>Model:</strong> ${data.model}<br> <strong>Device:</strong> ${data.device}<br> <strong>ngrok URL:</strong> ${data.ngrok_url || 'Active'} `; } catch (e) { document.getElementById('healthOutput').innerHTML = '❌ Error: ' + e.message; } } async function testChat() { const message = document.getElementById('chatMessage').value; const language = document.getElementById('chatLanguage').value; const temperature = parseFloat(document.getElementById('temperature').value); if (!message) { showOutput('chatOutput', 'Please enter a message', 'error'); return; } showOutput('chatOutput', 'Sending message', 'loading'); try { const response = await fetch(`${API_BASE}/api/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message, language: language, api_key: API_KEY, temperature: temperature, max_tokens: 512 }) }); const data = await response.json(); if (response.ok) { showOutput('chatOutput', `Language: ${data.language}\n\nResponse:\n${data.response}`, 'success'); } else { showOutput('chatOutput', `Error: ${data.detail}`, 'error'); } } catch (e) { showOutput('chatOutput', `Connection error: ${e.message}`, 'error'); } } async function testCode() { const prompt = document.getElementById('codePrompt').value; const language = document.getElementById('codeLanguage').value; if (!prompt) { showOutput('codeOutput', 'Please enter a prompt', 'error'); return; } showOutput('codeOutput', 'Generating code', 'loading'); try { const response = await fetch(`${API_BASE}/api/code`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code_prompt: prompt, language: language, api_key: API_KEY }) }); const data = await response.json(); if (response.ok) { showOutput('codeOutput', `Language: ${data.language}\n\n${data.code}`, 'success'); } else { showOutput('codeOutput', `Error: ${data.detail}`, 'error'); } } catch (e) { showOutput('codeOutput', `Connection error: ${e.message}`, 'error'); } } async function testImage() { const prompt = document.getElementById('imagePrompt').value; if (!prompt) { showOutput('imageOutput', 'Please enter a description', 'error'); return; } showOutput('imageOutput', 'Generating image URL', 'loading'); try { const response = await fetch(`${API_BASE}/api/image`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: prompt, api_key: API_KEY }) }); const data = await response.json(); if (response.ok) { showOutput('imageOutput', `URL: ${data.image_url}\n\nOpen: ${data.image_url}`, 'success'); } else { showOutput('imageOutput', `Error: ${data.detail}`, 'error'); } } catch (e) { showOutput('imageOutput', `Connection error: ${e.message}`, 'error'); } } async function testLongText() { const message = document.getElementById('longTextPrompt').value; if (!message) { showOutput('longTextOutput', 'Please enter a prompt', 'error'); return; } showOutput('longTextOutput', 'Generating long text', 'loading'); try { const response = await fetch(`${API_BASE}/api/long-text`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message, api_key: API_KEY, max_tokens: 2048, temperature: 0.8 }) }); const data = await response.json(); if (response.ok) { showOutput('longTextOutput', `Word Count: ${data.word_count}\n\n${data.response}`, 'success'); } else { showOutput('longTextOutput', `Error: ${data.detail}`, 'error'); } } catch (e) { showOutput('longTextOutput', `Connection error: ${e.message}`, 'error'); } } async function generateNewKey() { const username = document.getElementById('newUsername').value; const tier = document.getElementById('keyTier').value; const adminKey = document.getElementById('adminKeyInput').value; if (!username || !adminKey) { showOutput('keyOutput', 'Please fill all fields', 'error'); return; } showOutput('keyOutput', 'Generating key', 'loading'); try { const response = await fetch(`${API_BASE}/api/generate-key`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username, tier: tier, admin_key: adminKey }) }); const data = await response.json(); if (response.ok) { showOutput('keyOutput', `New Key Generated!\n\nKey: ${data.new_key}\nUser: ${data.username}\nTier: ${data.tier}`, 'success'); } else { showOutput('keyOutput', `Error: ${data.detail}`, 'error'); } } catch (e) { showOutput('keyOutput', `Connection error: ${e.message}`, 'error'); } } // Check health on load window.addEventListener('load', () => { checkHealth(); }); </script> </body> </html>
