name: "miai-music | MusicGen Small | 24/7 Music Engine"

on:
  schedule:
    - cron: '0 */6 * * *'   # Har 6 ghante me auto restart (music thoda heavy hai)
  workflow_dispatch:

jobs:
  miai-music-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      MODEL_NAME: "miai-music"
      HF_REPO: "facebook/musicgen-small"
      CACHE_KEY: "miai-music-musicgensmall-v1"

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.10 Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Model Files"
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./model_files/miai-music
          key: ${{ env.CACHE_KEY }}-${{ runner.os }}

      - name: "⬇️ Download MusicGen Small Model"
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./model_files/miai-music
          pip install -U "huggingface_hub"
          echo "🔄 Downloading facebook/musicgen-small (~328MB)..."
          hf download facebook/musicgen-small \
            --local-dir ./model_files/miai-music \
            --exclude "*.fp32" \
            --exclude "*.onnx*" \
            --exclude "openvino*"
          echo "✅ Download complete"

      - name: "📚 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.110.0 uvicorn==0.28.0 pyngrok requests
          pip install transformers==4.45.0 accelerate
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install audiocraft scipy

      - name: "🚀 Start miai-music Engine"
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_TEAM_SLUG: ${{ secrets.VERCEL_TEAM_SLUG }}
          MODEL_PATH: "./model_files/miai-music"
          PORT: "8002"
        run: |
          # Start server in background
          python server_music.py > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started (PID: $SERVER_PID)"

          # Wait for model loading
          echo "⏳ Loading MusicGen model..."
          sleep 45

          # Health check
          echo "🔍 Health check..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8002/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Wait $i/20..."
            sleep 5
          done

          # Get Ngrok URL
          echo "📡 Fetching public URL..."
          sleep 5
          PUBLIC_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"https://[^"]*' | cut -d'"' -f4 | head -1)

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Failed to get URL"
            cat server.log
            exit 1
          fi

          echo "🌐 Public URL: $PUBLIC_URL"

          # ⚠️ Vercel API env sync skipped (project name config issue)
          # Workaround: set MIAI_MUSIC_URL manually in Vercel dashboard
          echo "🔄 Manual Setup Required:"
          echo "   1. Go to Vercel Dashboard → Your Project → Settings → Environment Variables"
          echo "   2. Add/Update: MIAI_MUSIC_URL = $PUBLIC_URL"
          echo "   3. Target: Production, Preview, Development"

          # Trigger Vercel redeploy via webhook
          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "🚀 Triggering Vercel redeploy..."
            curl -X POST "${VERCEL_DEPLOY_HOOK_URL}" 2>/dev/null && echo "✅ Redeploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK_URL secret not set"
          fi

          # Keep alive
          echo "⏱️ Running for 5hr..."
          sleep 18000

          # Auto-trigger next run
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/actions/workflows/miai_music.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' 2>/dev/null && echo "🔄 Next run scheduled"

          wait $SERVER_PID
